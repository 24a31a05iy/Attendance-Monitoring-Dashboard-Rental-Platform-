<!DOCTYPE html>
<html>
<head>
    <title>Attendance Login - Pragati Engineering College</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            {% if settings.hero_image_path %}
            background: url('{{ settings.hero_image_path }}') no-repeat center center fixed;
            background-size: cover;
            {% else %}
            background-color: var(--bg-color);
            {% endif %}
        }
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            {% if settings.hero_image_path %}
            background: rgba(0, 0, 0, 0.4);
            {% endif %}
        }
        .login-card {
            max-width: 450px;
            width: 100%;
            {% if settings.hero_image_path %}
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255,255,255,0.4);
            {% endif %}
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="glass-card login-card p-5 shadow-lg">
            <div class="text-center mb-4">
                <img src="{{ settings.logo_path }}" alt="Logo" style="width: 80px; height: 80px; object-fit: contain;" class="mb-3">
                <h3 class="fw-bold college-brand mb-1">{{ settings.college_name }}</h3>
                <p class="text-muted small">{{ settings.welcome_text }}</p>
            </div>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert alert-danger bg-danger text-white border-0 py-2">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-medium text-muted small">Username</label>
                    <input type="text" class="form-control form-control-lg bg-light border-0" name="username" placeholder="Enter your username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium text-muted small">Password</label>
                    <input type="password" class="form-control form-control-lg bg-light border-0" name="password" placeholder="••••••••" required>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label text-muted small" for="remember">Remember me</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 py-2 mb-3 fs-5">Sign In</button>
            </form>
        
        <hr class="text-muted opacity-25">
        
        <div class="text-center mt-3">
            <a href="/create_test_data" class="text-decoration-none small text-muted hover-primary">
                <small>First time? Initialize Database Data</small>
            </a>
        </div>
        </div>
    </div>
</body>
</html>
